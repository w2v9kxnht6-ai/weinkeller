<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>🍷 Weinkeller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --wine-burgundy: #722f37;
            --wine-rose: #b76e79;
            --wine-gold: #d4af37;
            --bg-dark: #1a1a2e;
            --bg-light: #f8f5f2;
            --text-dark: #2d2d2d;
            --text-light: #666;
            --shadow: 0 8px 30px rgba(0,0,0,0.12);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--wine-burgundy) 0%, #4a1e23 100%);
            min-height: 100vh;
            padding-bottom: 80px;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(183, 110, 121, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .header {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px) saturate(180%);
            color: white;
            padding: 25px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, var(--wine-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        #status { 
            font-size: 0.85em; 
            margin-top: 8px;
            color: rgba(255,255,255,0.8);
            font-weight: 300;
        }
        
        #filterStats {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            padding: 12px 20px;
            margin: 15px 20px 0;
            color: white;
            display: none;
            backdrop-filter: blur(10px);
            animation: slideDown 0.3s ease;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        #filterStats.show { display: block; }
        
        .filter-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95em;
        }
        
        .filter-label {
            font-weight: 600;
            color: var(--wine-gold);
        }
        
        .filter-value {
            font-weight: 300;
        }
        
        .loading { 
            color: white; 
            text-align: center; 
            padding: 60px 20px;
            font-family: 'Playfair Display', serif;
            font-size: 1.3em;
        }
        
        .tabs {
            display: flex;
            background: rgba(255,255,255,0.95);
            margin: 20px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }
        
        .tab {
            flex: 1;
            padding: 14px 5px;
            border: none;
            background: transparent;
            font-size: 0.9em;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-light);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        
        .tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 80%;
            height: 3px;
            background: linear-gradient(90deg, var(--wine-burgundy), var(--wine-rose));
            border-radius: 3px 3px 0 0;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .tab.active {
            color: var(--wine-burgundy);
            font-weight: 600;
        }
        
        .tab.active::after {
            transform: translateX(-50%) scaleX(1);
        }
        
        .search {
            margin: 0 20px 20px;
        }
        
        .search input {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 15px;
            font-size: 1em;
            font-family: 'Inter', sans-serif;
            background: rgba(255,255,255,0.95);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }
        
        .search input:focus {
            outline: none;
            box-shadow: 0 8px 30px rgba(114, 47, 55, 0.2);
            transform: translateY(-2px);
        }
        
        #wines {
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }
        
        .wine {
            background: rgba(255,255,255,0.98);
            border-radius: 18px;
            padding: 22px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(114, 47, 55, 0.1);
            position: relative;
            overflow: hidden;
        }
        
        .wine::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--wine-burgundy), var(--wine-rose), var(--wine-gold));
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .wine:hover::before {
            opacity: 1;
        }
        
        .wine:active { 
            transform: scale(0.98); 
        }
        
        .wine:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(114, 47, 55, 0.2);
        }
        
        .wine-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        
        .pos {
            background: linear-gradient(135deg, var(--wine-burgundy), var(--wine-rose));
            color: white;
            padding: 7px 14px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85em;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(114, 47, 55, 0.3);
        }
        
        .ring { 
            font-size: 1.4em;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        
        .wine h3 { 
            color: var(--wine-burgundy);
            margin-bottom: 6px;
            font-family: 'Playfair Display', serif;
            font-weight: 600;
            font-size: 1.15em;
            line-height: 1.4;
        }
        
        .prod { 
            color: var(--text-light);
            margin-bottom: 14px;
            font-size: 0.9em;
            font-weight: 400;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            padding-top: 14px;
            border-top: 1px solid rgba(114, 47, 55, 0.1);
            font-weight: 600;
            font-size: 0.95em;
        }
        
        .stats > div {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        
        .stats .label {
            font-size: 0.7em;
            font-weight: 400;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: white;
            border-radius: 24px;
            max-width: 520px;
            width: 100%;
            max-height: 90vh;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .modal-scroll {
            overflow-y: auto;
            overflow-x: hidden;
            padding: 30px;
            flex: 1;
            -webkit-overflow-scrolling: touch;
        }
        
        .modal-content h3 {
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
            padding-bottom: 10px;
            margin: 0 0 8px 0;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        
        .modal-pos {
            background: linear-gradient(135deg, var(--wine-burgundy), var(--wine-rose));
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9em;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 2.2em;
            cursor: pointer;
            color: var(--text-light);
            line-height: 1;
            transition: all 0.2s ease;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        
        .close-btn:hover {
            background: rgba(114, 47, 55, 0.1);
            color: var(--wine-burgundy);
        }
        
        .modal h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5em;
            color: var(--wine-burgundy);
            margin-bottom: 8px;
            line-height: 1.3;
        }
        
        .modal-prod {
            color: var(--text-light);
            font-size: 1.05em;
            margin-bottom: 20px;
        }
        
        .detail-box {
            background: linear-gradient(135deg, #f8f5f2 0%, #faf8f5 100%);
            padding: 18px;
            border-radius: 14px;
            margin: 20px 0;
            border-left: 4px solid var(--wine-burgundy);
        }
        
        .detail-box > div {
            padding: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .detail-box > div:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            color: var(--text-light);
            font-size: 0.9em;
        }
        
        .detail-value {
            color: var(--text-dark);
            font-weight: 500;
        }
        
        .trinkreife-badge {
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85em;
        }
        
        .trinkreife-rosa {
            background: #ffb3d9;
            color: #8b1a52;
        }
        
        .trinkreife-gruen {
            background: #b3ffb3;
            color: #1a8b1a;
        }
        
        .trinkreife-normal {
            background: #e0e0e0;
            color: #555;
        }
        
        .ring-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9em;
        }
        
        .ring-rosa {
            background: linear-gradient(135deg, #ffb3d9 0%, #ff80bf 100%);
            color: #8b1a52;
        }
        
        .ring-gruen {
            background: linear-gradient(135deg, #b3ffb3 0%, #80ff80 100%);
            color: #1a8b1a;
        }
        
        .ring-blau {
            background: linear-gradient(135deg, #b3d9ff 0%, #80bfff 100%);
            color: #1a528b;
        }
        
        .value-box {
            background: linear-gradient(135deg, var(--wine-burgundy), var(--wine-rose));
            color: white;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(114, 47, 55, 0.3);
        }
        
        .value-box .small {
            font-size: 0.95em;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        
        .value-box .big {
            font-size: 2.5em;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
        }
        
        .ratings-box {
            background: linear-gradient(135deg, #fff9e6 0%, #fffaed 100%);
            padding: 16px;
            border-radius: 12px;
            margin-top: 16px;
            border-left: 4px solid var(--wine-gold);
        }
        
        .ratings-box strong {
            color: var(--wine-burgundy);
            display: block;
            margin-bottom: 8px;
        }
        
        .ratings-list {
            color: var(--text-dark);
            line-height: 1.8;
            word-wrap: break-word;
        }
        
        .notiz-box {
            background: linear-gradient(135deg, #e6f3ff 0%, #f0f8ff 100%);
            padding: 16px;
            border-radius: 12px;
            margin-top: 16px;
            border-left: 4px solid #4a90e2;
        }
        
        .notiz-box strong {
            color: var(--wine-burgundy);
            display: block;
            margin-bottom: 8px;
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 0;
            background: linear-gradient(135deg, var(--wine-burgundy), var(--wine-rose));
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(114, 47, 55, 0.3);
            font-family: 'Inter', sans-serif;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(114, 47, 55, 0.4);
        }
        
        .btn-danger { 
            background: linear-gradient(135deg, #dc3545, #c82333);
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
        }
        
        .btn-danger:hover {
            box-shadow: 0 6px 20px rgba(220, 53, 69, 0.4);
        }
        
        .btn-sec { 
            background: linear-gradient(135deg, #6c757d, #5a6268);
            box-shadow: 0 4px 15px rgba(108, 117, 125, 0.3);
        }
        
        .btn-sec:hover {
            box-shadow: 0 6px 20px rgba(108, 117, 125, 0.4);
        }
        
        .btn:active { 
            transform: scale(0.98); 
        }
        
        .empty-state {
            color: white;
            text-align: center;
            padding: 60px 20px;
            font-family: 'Playfair Display', serif;
        }
        
        .empty-state h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        
        .empty-state p {
            opacity: 0.7;
            font-family: 'Inter', sans-serif;
            font-size: 0.95em;
        }
    
        /* === V3 TAB SYSTEM === */
        .v3-tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            background: rgba(0,0,0,0.2);
            position: sticky;
            top: 80px;
            z-index: 90;
        }
        .v3-tab-btn {
            padding: 0.75rem 2rem;
            border: 2px solid var(--wine-gold);
            background: rgba(255,255,255,0.05);
            color: var(--bg-light);
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .v3-tab-btn:hover,
        .v3-tab-btn.active {
            background: var(--wine-gold);
            color: var(--wine-burgundy);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
        }
        .v3-tab-panel {
            display: none;
        }
        .v3-tab-panel.active {
            display: block;
        }

    
        /* === DASHBOARD STYLES === */
        .dash-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .dash-stat-card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .dash-stat-label {
            font-size: 0.85rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .dash-stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--wine-burgundy);
            margin: 0.5rem 0;
        }
        .dash-stat-sub {
            font-size: 0.9rem;
            color: var(--text-light);
        }
        .dash-chart-section,
        .dash-top-section {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }
        .dash-chart-section h2,
        .dash-top-section h2 {
            font-family: 'Playfair Display', serif;
            color: var(--wine-burgundy);
            margin-bottom: 1rem;
            font-size: 1.5rem;
            border-bottom: 2px solid var(--wine-burgundy);
            padding-bottom: 0.5rem;
        }
        .dash-top-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: #f8f5f2;
            border-radius: 8px;
            border-left: 3px solid var(--wine-burgundy);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .dash-top-item:hover {
            background: #f0ebe6;
            transform: translateX(3px);
        }
        .dash-top-rank {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--wine-burgundy);
            margin-right: 1rem;
            min-width: 2rem;
        }
        .dash-top-name {
            flex: 1;
        }
        .dash-top-value {
            font-weight: 600;
            color: var(--wine-burgundy);
            font-size: 1.1rem;
        }

    
        /* === ERWEITERTE DASHBOARD SEKTIONEN === */
        .dash-expand-section {
            background: white;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
            overflow: hidden;
        }
        .dash-expand-section.alert-section {
            border: 2px solid #ffc107;
        }
        .dash-expand-header {
            padding: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s ease;
        }
        .dash-expand-header:hover {
            background: #f8f5f2;
        }
        .dash-expand-header h2 {
            margin: 0;
            font-family: 'Playfair Display', serif;
            color: var(--wine-burgundy);
            font-size: 1.5rem;
        }
        .dash-expand-icon {
            font-size: 1.5rem;
            color: var(--wine-burgundy);
            transition: transform 0.3s ease;
        }
        .dash-expand-section.open .dash-expand-icon {
            transform: rotate(180deg);
        }
        .dash-expand-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .dash-expand-section.open .dash-expand-content {
            max-height: 2000px;
            padding: 1.5rem;
            border-top: 1px solid #eee;
        }
        
        /* Ring Details */
        .ring-details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
        }
        .ring-detail-card {
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
        }
        .ring-detail-card.blau { background: linear-gradient(135deg, #e3f2fd, #bbdefb); }
        .ring-detail-card.gruen { background: linear-gradient(135deg, #e8f5e9, #c8e6c9); }
        .ring-detail-card.rosa { background: linear-gradient(135deg, #fce4ec, #f8bbd0); }
        .ring-detail-card.neutral { background: linear-gradient(135deg, #f5f5f5, #e0e0e0); }
        .ring-detail-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .ring-detail-title { font-weight: 600; color: #666; margin-bottom: 0.75rem; }
        .ring-detail-count { font-weight: 700; font-size: 1.2rem; color: var(--wine-burgundy); }
        
        /* Highlights Scroll */
        .highlights-scroll {
            max-height: 500px;
            overflow-y: auto;
        }
        .highlight-wine {
            padding: 1rem;
            margin-bottom: 0.75rem;
            background: #f8f5f2;
            border-radius: 8px;
            border-left: 4px solid var(--wine-burgundy);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .highlight-wine:hover {
            background: #f0ebe6;
            transform: translateX(3px);
        }
        .highlight-wine-title {
            font-weight: 700;
            color: var(--wine-burgundy);
            margin-bottom: 0.5rem;
        }
        .highlight-wine-info {
            font-size: 0.9rem;
            color: #666;
        }
        .highlight-wine-ratings {
            font-size: 0.85rem;
            color: #999;
            margin-top: 0.5rem;
        }

    </style>
</head>
<body>
    <div class="header">
        <h1>🍷 Mein Weinkeller</h1>
        <div id="status">Lade...</div>
    

    <!-- V3 TAB SYSTEM -->
    <div class="v3-tabs">
        <button class="v3-tab-btn active" data-tab="dashboard">📊 Dashboard</button>
        <button class="v3-tab-btn" data-tab="weine">🍷 Weine</button>
    </div>

    <!-- DASHBOARD TAB PANEL -->
    <div id="dashboard-panel" class="v3-tab-panel active">
                <!-- DASHBOARD CONTENT -->
        <div style="max-width: 1200px; margin: 0 auto; padding: 1rem;">
            
            <!-- Stats Grid -->
            <div class="dash-stats-grid">
                <div class="dash-stat-card">
                    <div class="dash-stat-label">Flaschen</div>
