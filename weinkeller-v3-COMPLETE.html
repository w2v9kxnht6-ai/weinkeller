<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍷 Weinkeller Dashboard V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <style>
        :root {
            --wine-red: #8B0000;
            --wine-dark: #4A0000;
            --gold: #D4AF37;
            --cream: #FFF8DC;
            --glass-bg: rgba(255, 248, 220, 0.1);
            --glass-border: rgba(212, 175, 55, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, var(--wine-dark) 0%, var(--wine-red) 50%, var(--wine-dark) 100%);
            min-height: 100vh;
            color: var(--cream);
            padding-bottom: 2rem;
        }
        .header {
            background: linear-gradient(135deg, var(--wine-red), var(--wine-dark));
            padding: 1.5rem 1rem;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
            background: rgba(0,0,0,0.2);
        }
        .tab-btn {
            padding: 0.75rem 2rem;
            border: 2px solid var(--gold);
            background: var(--glass-bg);
            color: var(--cream);
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .tab-btn:hover, .tab-btn.active {
            background: var(--gold);
            color: var(--wine-dark);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
        
        /* Dashboard Styles */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .stat-card .label {
            font-size: 0.85rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .stat-card .value {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
        }
        .section {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }
        .section h2 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin-bottom: 1rem;
            font-size: 1.5rem;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 0.5rem;
        }
        .chart-container { position: relative; height: 300px; margin: 1rem 0; }
        .top-list { list-style: none; }
        .top-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: rgba(255, 248, 220, 0.05);
            border-radius: 8px;
            border-left: 3px solid var(--gold);
        }
        .top-item .rank {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gold);
            margin-right: 1rem;
            min-width: 2rem;
        }
        .top-item .name { flex: 1; font-size: 0.95rem; }
        .top-item .value { font-weight: 600; color: var(--gold); font-size: 1.1rem; }
        
        /* Weine Tab - FROM V2 */
        .filter-stats {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-around;
            backdrop-filter: blur(10px);
        }
        .filter-stat { text-align: center; }
        .filter-stat .label { font-size: 0.85rem; opacity: 0.8; }
        .filter-stat .value { font-size: 1.5rem; font-weight: 700; color: var(--gold); }
        .filter-section {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
        }
        .filter-group { margin-bottom: 1rem; }
        .filter-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--gold);
        }
        input, select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            background: rgba(255, 248, 220, 0.1);
            color: var(--cream);
            font-size: 1rem;
        }
        .wine-grid { display: grid; gap: 1rem; }
        .wine-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }
        .wine-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
        }
        .wine-card.ring-blau { border-left-color: #4169E1; }
        .wine-card.ring-rosa { border-left-color: #FF69B4; }
        .wine-card.ring-gruen { border-left-color: #32CD32; }
        .wine-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        .wine-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gold);
        }
        .wine-value { font-size: 1.2rem; font-weight: 700; color: var(--gold); }
        .wine-details { font-size: 0.9rem; opacity: 0.8; margin-bottom: 0.5rem; }
        .wine-position {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            background: rgba(212, 175, 55, 0.2);
            border-radius: 4px;
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            overflow-y: auto;
        }
        .modal.active { display: flex; align-items: center; justify-content: center; }
        .modal-content {
            background: linear-gradient(135deg, var(--wine-dark), var(--wine-red));
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .modal-close {
            float: right;
            font-size: 2rem;
            color: var(--gold);
            cursor: pointer;
            line-height: 1;
        }
        .modal h2 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }
        .modal-detail { margin-bottom: 1rem; }
        .modal-detail strong { color: var(--gold); }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 1.5rem; }
            .tabs { flex-direction: column; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🍷 Mein Weinkeller V3</h1>
        <div class="subtitle">Dashboard & Verwaltung</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('dashboard')">📊 Dashboard</button>
        <button class="tab-btn" onclick="switchTab('weine')">🍷 Weine</button>
    </div>

    <div class="container">
        <!-- DASHBOARD TAB -->
        <div id="dashboard-tab" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="label">Flaschen</div>
                    <div class="value" id="stat-total">-</div>
                    <div class="subtext"><span id="stat-getrunken">-</span> getrunken</div>
                </div>
                <div class="stat-card">
                    <div class="label">Gesamtwert</div>
                    <div class="value" id="stat-wert">-</div>
                </div>
                <div class="stat-card">
                    <div class="label">Investment</div>
                    <div class="value" id="stat-ek">-</div>
                </div>
                <div class="stat-card">
                    <div class="label">Gewinn</div>
                    <div class="value" id="stat-gewinn">-</div>
                </div>
            </div>

            <div class="section">
                <h2>🎨 Ring-Verteilung</h2>
                <div class="chart-container"><canvas id="ringChart"></canvas></div>
            </div>

            <div class="section">
                <h2>🌍 Portfolio nach Ländern</h2>
                <div class="chart-container"><canvas id="countryChart"></canvas></div>
            </div>

            <div class="section">
                <h2>💎 Top 10 Wertvollste</h2>
                <ul class="top-list" id="top-wert-list"></ul>
            </div>

            <div class="section">
                <h2>🏆 Top 10 P/L</h2>
                <ul class="top-list" id="top-pl-list"></ul>
            </div>
        </div>

        <!-- WEINE TAB (FROM V2) -->
        <div id="weine-tab" class="tab-content">
            <div class="filter-stats">
                <div class="filter-stat">
                    <div class="label">Flaschen</div>
                    <div class="value" id="filtered-count">-</div>
                </div>
                <div class="filter-stat">
                    <div class="label">Wert</div>
                    <div class="value" id="filtered-value">-</div>
                </div>
            </div>

            <div class="filter-section">
                <div class="filter-group">
                    <label>🔍 Suche</label>
                    <input type="text" id="search" placeholder="Produzent, Wein, Position...">
                </div>
                <div class="filter-group">
                    <label>🎨 Ring</label>
                    <select id="ringFilter">
                        <option value="">Alle</option>
                        <option value="Blau">🔵 Blau</option>
                        <option value="Rosa">🌸 Rosa</option>
                        <option value="Grün">🟢 Grün</option>
                        <option value="Kein Ring">⚪ Kein Ring</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>🌍 Land</label>
                    <select id="countryFilter">
                        <option value="">Alle</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>📍 Lager</label>
                    <select id="posFilter">
                        <option value="">Alle</option>
                        <option value="LIEFERUNG">🚚 LIEFERUNG</option>
                        <option value="GETRUNKEN">🍷 GETRUNKEN</option>
                        <option value="OWC">📦 OWC</option>
                        <option value="Rosaregal">🌸 Rosaregal</option>
                    </select>
                </div>
            </div>
            <div class="wine-grid" id="wine-grid"></div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://cdxmdavnspgczenhgjmk.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkeG1kYXZuc3BnY3plbmhnam1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMDI2NDEsImV4cCI6MjA4NjY3ODY0MX0.HgoScNFXdOTFKmPn5lJuh7V0GAoABPz61p1JcjDovbE';
        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

        let allWeine = [];
        let currentFilter = [];

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.add('active');
            event.target.classList.add('active');
        }

        async function loadData() {
            const { data } = await sb.from('weine').select('*').order('position');
            allWeine = data || [];
            
            const aktiv = allWeine.filter(w => !w.position.startsWith('GETRUNKEN'));
            const getrunken = allWeine.length - aktiv.length;
            const totalWert = aktiv.reduce((s, w) => s + (parseFloat(w.aktueller_wert) || 0), 0);
            const totalEK = aktiv.reduce((s, w) => s + (parseFloat(w.einkaufspreis) || 0), 0);
            const gewinn = totalWert - totalEK;
            const gewinnPct = totalEK > 0 ? (gewinn / totalEK * 100) : 0;

            document.getElementById('stat-total').textContent = aktiv.length;
            document.getElementById('stat-getrunken').textContent = getrunken;
            document.getElementById('stat-wert').textContent = '€' + totalWert.toFixed(0);
            document.getElementById('stat-ek').textContent = '€' + totalEK.toFixed(0);
            document.getElementById('stat-gewinn').textContent = '+€' + gewinn.toFixed(0) + ' (+' + gewinnPct.toFixed(1) + '%)';

            const rings = { Blau: 0, Rosa: 0, Grün: 0, 'Kein Ring': 0 };
            const ringWerte = { Blau: 0, Rosa: 0, Grün: 0, 'Kein Ring': 0 };
            aktiv.forEach(w => {
                const r = w.ring || 'Kein Ring';
                rings[r]++;
                ringWerte[r] += parseFloat(w.aktueller_wert) || 0;
            });

            createRingChart(rings, ringWerte);

            const countries = {};
            aktiv.forEach(w => {
                let country = 'Andere';
                const map = {'Fontodi':'Italien','Château':'Frankreich','Kollwentz':'Österreich','Marqués':'Spanien','Damjanic':'Kroatien'};
                for (const [k, v] of Object.entries(map)) {
                    if (w.produzent.includes(k)) { country = v; break; }
                }
                countries[country] = (countries[country] || 0) + (parseFloat(w.aktueller_wert) || 0);
            });
            createCountryChart(countries);

            const topW = [...aktiv].sort((a,b) => (parseFloat(b.aktueller_wert)||0) - (parseFloat(a.aktueller_wert)||0)).slice(0,10);
            const topPL = [...aktiv].filter(w => parseFloat(w.einkaufspreis)>0).sort((a,b) => (parseFloat(b.wertsteigerung_prozent)||0) - (parseFloat(a.wertsteigerung_prozent)||0)).slice(0,10);
            
            renderTopList('top-wert-list', topW, w => '€' + parseFloat(w.aktueller_wert).toFixed(0));
            renderTopList('top-pl-list', topPL, w => '+' + parseFloat(w.wertsteigerung_prozent).toFixed(0) + '%');

            populateCountryFilter();
            filterWeine();
        }

        function createRingChart(rings, werte) {
            new Chart(document.getElementById('ringChart'), {
                type: 'doughnut',
                data: {
                    labels: ['🔵 Blau', '🌸 Rosa', '🟢 Grün', '⚪ Kein Ring'],
                    datasets: [{
                        data: [rings.Blau, rings.Rosa, rings.Grün, rings['Kein Ring']],
                        backgroundColor: ['#4169E1','#FF69B4','#32CD32','#D3D3D3'],
                        borderColor: '#FFF8DC',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#FFF8DC' } },
                        tooltip: {
                            callbacks: {
                                label: ctx => {
                                    const k = ['Blau','Rosa','Grün','Kein Ring'][ctx.dataIndex];
                                    return `${ctx.label}: ${ctx.parsed} Fl. (€${werte[k].toFixed(0)})`;
                                }
                            }
                        }
                    }
                }
            });
        }

        function createCountryChart(countries) {
            const sorted = Object.entries(countries).sort((a,b) => b[1]-a[1]);
            new Chart(document.getElementById('countryChart'), {
                type: 'bar',
                data: {
                    labels: sorted.map(([k]) => k),
                    datasets: [{
                        data: sorted.map(([,v]) => v),
                        backgroundColor: '#D4AF37',
                        borderColor: '#FFF8DC'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y',
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#FFF8DC' }, grid: { color: 'rgba(255,248,220,0.1)' } },
                        y: { ticks: { color: '#FFF8DC' }, grid: { display: false } }
                    }
                }
            });
        }

        function renderTopList(id, items, fn) {
            document.getElementById(id).innerHTML = items.map((w,i) => `
                <li class="top-item">
                    <span class="rank">${i+1}</span>
                    <span class="name">${w.produzent} ${w.weinname} ${w.jahrgang||''}</span>
                    <span class="value">${fn(w)}</span>
                </li>
            `).join('');
        }

        function populateCountryFilter() {
            const countries = new Set();
            allWeine.forEach(w => {
                const map = {'Fontodi':'Italien','Château':'Frankreich','Kollwentz':'Österreich','Marqués':'Spanien','Damjanic':'Kroatien'};
                for (const [k,v] of Object.entries(map)) {
                    if (w.produzent.includes(k)) { countries.add(v); break; }
                }
            });
            const opts = Array.from(countries).sort().map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('countryFilter').innerHTML = '<option value="">Alle</option>' + opts;
        }

        function filterWeine() {
            const search = document.getElementById('search').value.toLowerCase();
            const ring = document.getElementById('ringFilter').value;
            const country = document.getElementById('countryFilter').value;
            const pos = document.getElementById('posFilter').value;

            currentFilter = allWeine.filter(w => {
                const matchSearch = !search || w.produzent.toLowerCase().includes(search) || w.weinname.toLowerCase().includes(search) || w.position.toLowerCase().includes(search);
                const matchRing = !ring || (ring === 'Kein Ring' ? !w.ring : w.ring === ring);
                let matchCountry = !country;
                if (country) {
                    const map = {'Fontodi':'Italien','Château':'Frankreich','Kollwentz':'Österreich','Marqués':'Spanien','Damjanic':'Kroatien'};
                    for (const [k,v] of Object.entries(map)) {
                        if (w.produzent.includes(k) && v === country) { matchCountry = true; break; }
                    }
                }
                const matchPos = !pos || w.position.startsWith(pos);
                return matchSearch && matchRing && matchCountry && matchPos;
            });

            renderWeine(currentFilter);
            updateFilterStats(currentFilter);
        }

        function updateFilterStats(weine) {
            const val = weine.reduce((s,w) => s + (parseFloat(w.aktueller_wert)||0), 0);
            document.getElementById('filtered-count').textContent = weine.length;
            document.getElementById('filtered-value').textContent = '€' + val.toFixed(0);
        }

        function renderWeine(weine) {
            document.getElementById('wine-grid').innerHTML = weine.map(w => {
                const ringClass = w.ring ? `ring-${w.ring.toLowerCase()}` : '';
                const ringEmoji = {Blau:'🔵',Rosa:'🌸',Grün:'🟢'}[w.ring] || '⚪';
                return `
                    <div class="wine-card ${ringClass}" onclick="openModal(${w.id})">
                        <div class="wine-header">
                            <div class="wine-name">${w.produzent} ${w.weinname}</div>
                            <div class="wine-value">€${parseFloat(w.aktueller_wert||0).toFixed(0)}</div>
                        </div>
                        <div class="wine-details">${w.jahrgang||''} | ${w.traube||''} | ${w.flaschengroesse||''}</div>
                        <div class="wine-position">${ringEmoji} ${w.position}</div>
                    </div>
                `;
            }).join('');
        }

        function openModal(id) {
            const w = allWeine.find(wine => wine.id === id);
            if (!w) return;
            const html = `
                <h2>${w.produzent} ${w.weinname}</h2>
                <div class="modal-detail"><strong>Jahrgang:</strong> ${w.jahrgang||'-'}</div>
                <div class="modal-detail"><strong>Traube:</strong> ${w.traube||'-'}</div>
                <div class="modal-detail"><strong>Position:</strong> ${w.position}</div>
                <div class="modal-detail"><strong>Ring:</strong> ${w.ring||'Kein Ring'}</div>
                <div class="modal-detail"><strong>Wert:</strong> €${parseFloat(w.aktueller_wert||0).toFixed(2)}</div>
                <div class="modal-detail"><strong>EK:</strong> €${parseFloat(w.einkaufspreis||0).toFixed(2)}</div>
                <div class="modal-detail"><strong>Gewinn:</strong> +${parseFloat(w.wertsteigerung_prozent||0).toFixed(1)}%</div>
                <div class="modal-detail"><strong>Ratings:</strong> ${w.ratings||'-'}</div>
                <div class="modal-detail"><strong>Trinkreife:</strong> ${w.trinkreife_start||''} - ${w.trinkreife_ende||''}</div>
                <div class="modal-detail"><strong>Dekantieren:</strong> ${w.dekantierzeit||'-'}</div>
                <div class="modal-detail"><strong>Notiz:</strong> ${w.notiz||'-'}</div>
            `;
            document.getElementById('modal-body').innerHTML = html;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        document.getElementById('search').addEventListener('input', filterWeine);
        document.getElementById('ringFilter').addEventListener('change', filterWeine);
        document.getElementById('countryFilter').addEventListener('change', filterWeine);
        document.getElementById('posFilter').addEventListener('change', filterWeine);

        loadData();
    </script>
</body>
</html>
